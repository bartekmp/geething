name: Publish to AMO

on:
  release:
    types: [published]

jobs:
  publish:
    if: false  # disabled until AMO secrets are configured
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build extension
        run: npm run build

      - name: Sign and publish to AMO
        env:
          FIREFOX_JWT_ISSUER: ${{ secrets.FIREFOX_JWT_ISSUER }}
          FIREFOX_JWT_SECRET: ${{ secrets.FIREFOX_JWT_SECRET }}
        run: |
          npx web-ext sign \
            --source-dir=src \
            --api-key="${FIREFOX_JWT_ISSUER}" \
            --api-secret="${FIREFOX_JWT_SECRET}" \
            --channel=listed

      - name: Upload signed XPI as release asset
        uses: actions/upload-artifact@v4
        with:
          name: geething-signed-${{ github.ref_name }}
          path: web-ext-artifacts/*.xpi
