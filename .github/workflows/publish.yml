name: Publish to AMO

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Write OAuth credentials
        env:
          CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
        run: |
          cat > src/shared/credentials.js <<EOF
          export const CLIENT_ID = '${CLIENT_ID}';
          export const CLIENT_SECRET = '${CLIENT_SECRET}';
          EOF

      - name: Run tests
        run: npm test

      - name: Build extension
        run: npm run build

      - name: Sign and publish to AMO
        env:
          FIREFOX_JWT_ISSUER: ${{ secrets.FIREFOX_JWT_ISSUER }}
          FIREFOX_JWT_SECRET: ${{ secrets.FIREFOX_JWT_SECRET }}
        run: |
          npx web-ext sign \
            --source-dir=src \
            --api-key="${FIREFOX_JWT_ISSUER}" \
            --api-secret="${FIREFOX_JWT_SECRET}" \
            --channel=listed

      - name: Upload signed XPI as release asset
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload ${{ github.ref_name }} web-ext-artifacts/*.xpi
