name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Write stub credentials for tests
        run: |
          echo "export const CLIENT_ID = 'ci-stub'; export const CLIENT_SECRET = 'ci-stub';" > src/shared/credentials.js

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Unit tests
        run: npm test

      - name: web-ext lint
        run: npx web-ext lint --source-dir=src

      - name: Build
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: geething-${{ github.sha }}
          path: web-ext-artifacts/*.zip
          retention-days: 7
