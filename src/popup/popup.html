<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Geething</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="brand">
        <img src="../icons/icon-32.png" alt="" width="20" height="20" />
        <span>Geething</span>
      </div>
      <div class="topbar-actions">
        <div id="mute-btn-wrapper" class="mute-btn-wrapper">
          <button
            id="mute-btn"
            class="icon-btn"
            title="Mute notifications"
            aria-label="Mute notifications"
            aria-haspopup="true"
            aria-expanded="false"
            hidden
          ></button>
          <div id="mute-dropdown" class="mute-dropdown" hidden role="menu"></div>
        </div>
        <button
          id="gmail-btn"
          class="icon-btn"
          title="Open Gmail™ inbox"
          aria-label="Open Gmail™ inbox"
          hidden
        >
          <svg viewBox="0 0 24 24" width="16" height="16" aria-hidden="true" fill="currentColor">
            <path
              d="M20 4H4C2.9 4 2 4.9 2 6v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4-8 5-8-5V6l8 5 8-5v2z"
            />
          </svg>
        </button>
        <button
          id="compose-btn"
          class="icon-btn"
          title="Compose new email"
          aria-label="Compose new email"
          hidden
        >
          <svg viewBox="0 0 24 24" width="16" height="16" aria-hidden="true" fill="currentColor">
            <path
              d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04a1 1 0 0 0 0-1.41l-2.34-2.34a1 1 0 0 0-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"
            />
          </svg>
        </button>
        <button
          id="mark-all-btn"
          class="icon-btn"
          title="Mark all as read"
          aria-label="Mark all as read"
          hidden
        >
          <svg viewBox="0 0 24 24" width="16" height="16" aria-hidden="true" fill="currentColor">
            <path
              d="M18 7l-1.41-1.41-6.34 6.34 1.41 1.41L18 7zm4.24-1.41L11.66 16.17 7.48 12l-1.41 1.41L11.66 19l12-12-1.42-1.41zM.41 13.41L6 19l1.41-1.41L1.83 12 .41 13.41z"
            />
          </svg>
        </button>
        <button id="refresh-btn" class="icon-btn" title="Refresh" aria-label="Refresh">
          <svg viewBox="0 0 24 24" width="16" height="16" aria-hidden="true" fill="currentColor">
            <path d="M12 4V1L8 5l4 4V6a6 6 0 1 1-6 6H4a8 8 0 1 0 8-8z" />
          </svg>
        </button>
        <button id="add-account-btn" class="icon-btn" title="Add account" aria-label="Add account">
          <svg viewBox="0 0 24 24" width="16" height="16" aria-hidden="true" fill="currentColor">
            <path d="M11 11V5h2v6h6v2h-6v6h-2v-6H5v-2z" />
          </svg>
        </button>
        <button
          id="select-btn"
          class="icon-btn"
          title="Select messages"
          aria-label="Select messages"
          hidden
        >
          <svg viewBox="0 0 24 24" width="16" height="16" aria-hidden="true" fill="currentColor">
            <path
              d="M19 3H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V5a2 2 0 0 0-2-2zm-9 14-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"
            />
          </svg>
        </button>
        <button id="options-btn" class="icon-btn" title="Settings" aria-label="Settings">
          <svg viewBox="0 0 24 24" width="16" height="16" aria-hidden="true" fill="currentColor">
            <path
              d="M19.43 12.98c.04-.32.07-.64.07-.98s-.03-.66-.07-.98l2.11-1.65c.19-.15.24-.42.12-.64l-2-3.46c-.12-.22-.39-.3-.61-.22l-2.49 1c-.52-.4-1.08-.73-1.69-.98l-.38-2.65C14.46 2.18 14.25 2 14 2h-4c-.25 0-.46.18-.49.42l-.38 2.65c-.61.25-1.17.59-1.69.98l-2.49-1c-.23-.09-.49 0-.61.22l-2 3.46c-.13.22-.07.49.12.64l2.11 1.65c-.04.32-.07.65-.07.98s.03.66.07.98l-2.11 1.65c-.19.15-.24.42-.12.64l2 3.46c.12.22.39.3.61.22l2.49-1c.52.4 1.08.73 1.69.98l.38 2.65c.03.24.24.42.49.42h4c.25 0 .46-.18.49-.42l.38-2.65c.61-.25 1.17-.59 1.69-.98l2.49 1c.23.09.49 0 .61-.22l2-3.46c.13-.22.07-.49-.12-.64l-2.11-1.65zM12 15.5c-1.93 0-3.5-1.57-3.5-3.5s1.57-3.5 3.5-3.5 3.5 1.57 3.5 3.5-1.57 3.5-3.5 3.5z"
            />
          </svg>
        </button>
      </div>
    </header>

    <nav id="account-tabs" class="account-tabs" role="tablist" aria-label="Gmail accounts"></nav>

    <main id="content" class="content">
      <div id="empty-state" class="empty-state" hidden>
        <img src="../icons/icon-48.png" alt="" width="48" height="48" />
        <h2>Welcome to Geething</h2>
        <p>
          Get desktop notifications for Gmail™ across multiple accounts — all processed locally, no
          external servers.
        </p>
        <button id="onboarding-add-btn" type="button" class="onboarding-add-btn">
          Connect Gmail™ account
        </button>
      </div>
      <div id="error-banner" class="error-banner" hidden></div>
      <ul id="email-list" class="email-list" role="list"></ul>
      <div id="loading" class="loading" hidden>
        <span class="spinner" aria-hidden="true"></span>
        <span>Loading…</span>
      </div>
    </main>

    <div id="bulk-bar" class="bulk-bar" hidden aria-live="polite">
      <span id="bulk-count" class="bulk-count"></span>
      <div class="bulk-actions">
        <button id="bulk-read-btn" type="button" class="bulk-action-btn" disabled>Mark read</button>
        <button id="bulk-archive-btn" type="button" class="bulk-action-btn" disabled>
          Archive
        </button>
        <button id="bulk-trash-btn" type="button" class="bulk-action-btn danger" disabled>
          Delete
        </button>
        <button id="bulk-cancel-btn" type="button" class="bulk-action-btn">Cancel</button>
      </div>
    </div>

    <nav id="pagination" class="pagination-bar" hidden aria-label="Email page navigation">
      <button id="pagination-prev" type="button" class="pagination-btn" aria-label="Previous page">
        &#8249;
      </button>
      <span id="pagination-info" class="pagination-info"></span>
      <button id="pagination-next" type="button" class="pagination-btn" aria-label="Next page">
        &#8250;
      </button>
    </nav>

    <section id="email-detail" class="email-detail" hidden aria-live="polite">
      <div class="detail-topbar">
        <button class="back-btn" id="back-btn" type="button">← Back</button>
        <div id="detail-actions" class="detail-actions"></div>
      </div>
      <div id="detail-content" class="detail-scroll"></div>
    </section>

    <script type="module" src="popup.js"></script>
  </body>
</html>
