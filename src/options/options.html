<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Geething — Settings</title>
    <link rel="stylesheet" href="options.css" />
  </head>
  <body>
    <div class="page">
      <header class="hero">
        <img src="../icons/icon-48.png" alt="" width="32" height="32" />
        <div>
          <h1>Geething</h1>
          <p class="hero-sub">Multi-account Gmail notifications extension</p>
        </div>
      </header>

      <section class="card">
        <h2>Accounts</h2>
        <div id="accounts-list" class="accounts-list"></div>
        <button id="add-account" type="button" class="btn btn-primary">Add Gmail account</button>
        <p id="accounts-status" class="status" hidden></p>
      </section>

      <section class="card">
        <h2>Notifications</h2>
        <label class="row">
          <span>Enable desktop notifications</span>
          <input id="notificationsEnabled" type="checkbox" />
        </label>
        <label class="row">
          <span>Play sound on new mail</span>
          <input id="notificationSound" type="checkbox" />
        </label>
        <label class="row">
          <span>Notification detail</span>
          <select id="notificationContentMode">
            <option value="title">Subject only</option>
            <option value="title-snippet">Subject + preview</option>
          </select>
        </label>
        <div class="row sound-row">
          <span
            >Custom notification sound<br /><small class="muted"
              >MP3/WAV/OGG · max 500 KB · max 5 s</small
            ></span
          >
          <div class="sound-controls">
            <button id="preview-sound" type="button" class="btn btn-ghost">Preview</button>
            <label class="btn btn-ghost file-label">
              Upload
              <input id="sound-upload" type="file" accept="audio/*" hidden />
            </label>
            <button id="sound-clear" type="button" class="btn btn-danger" hidden>Remove</button>
          </div>
        </div>
        <p id="sound-status" class="status" hidden></p>
      </section>

      <section class="card">
        <h2>Polling</h2>
        <label class="row">
          <span>Check interval: <output id="pollValue">2</output> min</span>
          <input id="pollIntervalMinutes" type="range" min="1" max="30" step="1" />
        </label>
        <label class="row">
          <span>Max messages shown per account</span>
          <input id="maxMessagesPerAccount" type="number" min="5" max="50" step="5" />
        </label>
        <label class="row">
          <span>Auto mark-as-read when opening preview</span>
          <input id="autoMarkReadOnOpen" type="checkbox" />
        </label>
      </section>

      <section class="card">
        <h2>Appearance</h2>
        <label class="row">
          <span>Theme</span>
          <select id="theme">
            <option value="auto">Auto (system)</option>
            <option value="light">Light</option>
            <option value="dark">Dark</option>
          </select>
        </label>
        <label class="row">
          <span>Popup width: <output id="popupWidthValue">560</output> px</span>
          <input id="popupWidth" type="range" min="400" max="800" step="20" />
        </label>
      </section>

      <section class="card">
        <h2>About</h2>
        <p class="muted">
          Geething — <span id="version"></span>. Licensed under GPL-3.0.<br />
          Source:
          <a href="https://github.com/bartekmp/geething" target="_blank" rel="noopener noreferrer"
            >github.com/bartekmp/geething</a
          ><br />
          <a id="changelog-link" href="#" target="_blank" rel="noopener noreferrer">Changelog</a>
        </p>
      </section>

      <p id="save-indicator" class="save-indicator" hidden>Saved ✓</p>
    </div>

    <script type="module" src="options.js"></script>
  </body>
</html>
